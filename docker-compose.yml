services:
  app:
    build: .
    container_name: mpd-workscope-app
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - "8084:8084"
    env_file: .env
    environment:
      - PORT=8084
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8084/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
