<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in – Scopewrath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dae': '#c00000',
            'dae-red': '#c00000',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-md space-y-8">
    <div class="text-center">
      <img src="/static/img/dae-logo.jpg" alt="DAE" class="mx-auto h-12 w-auto">
      <h1 class="mt-6 text-2xl font-semibold tracking-tight text-gray-900">Scopewrath</h1>
      <p class="mt-1 text-sm text-gray-500">Sign in to manage MPD and workscope analysis.</p>
    </div>
    <div class="mt-8 bg-white py-8 px-6 shadow rounded-lg border border-gray-100">
      {% if error %}
      <div class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}
      <form action="/login" method="post" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required
                 value="{{ username or '' }}"
                 class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-dae focus:ring-dae">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
                 class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-dae focus:ring-dae">
        </div>
        <button type="submit"
                class="w-full inline-flex justify-center rounded-md border border-transparent bg-dae py-2 px-4 text-sm font-semibold text-white shadow-sm hover:bg-dae/90 focus:outline-none focus:ring-2 focus:ring-dae focus:ring-offset-2">
          Sign in
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-400">DAE – Dubai Aerospace Enterprise</p>
  </div>
</body>
</html>
