{% extends "base.html" %}
{% block title %}New Project – Noteify MPD{% endblock %}
{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">New Project</h1>
  <p class="mt-1 text-gray-500 dark:text-gray-400">Create a workscope evaluation for one aircraft MSN.</p>
</div>

<div class="max-w-xl">
  <form id="project-form" class="space-y-5 p-6 bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700">
    <div>
      <label for="manufacturer" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Manufacturer</label>
      <input type="text" id="manufacturer" name="manufacturer" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-dae focus:border-dae block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    </div>
    <div>
      <label for="model" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Model</label>
      <input type="text" id="model" name="model" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-dae focus:border-dae block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    </div>
    <div>
      <label for="msn" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">MSN</label>
      <input type="text" id="msn" name="msn" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-dae focus:border-dae block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    </div>
    <div>
      <label for="registration" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Registration (optional)</label>
      <input type="text" id="registration" name="registration" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-dae focus:border-dae block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    </div>
    <div>
      <label for="mpd_dataset_id" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">MPD Dataset</label>
      <select id="mpd_dataset_id" name="mpd_dataset_id" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-dae focus:border-dae block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
        <option value="">— Select —</option>
        {% for d in datasets %}
        <option value="{{ d.id }}">{{ d.manufacturer }} {{ d.model }} {{ d.revision }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="text-white bg-dae hover:bg-dae/90 focus:ring-4 focus:ring-dae/30 font-medium rounded-lg text-sm px-5 py-2.5">Create Project</button>
  </form>
</div>

<script>
document.getElementById('project-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {
    manufacturer: fd.get('manufacturer'),
    model: fd.get('model'),
    msn: fd.get('msn'),
    registration: fd.get('registration') || null,
    mpd_dataset_id: fd.get('mpd_dataset_id') ? parseInt(fd.get('mpd_dataset_id')) : null
  };
  const r = await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const j = await r.json();
  if (j.id) window.location.href = '/projects/' + j.id;
});
</script>
{% endblock %}
