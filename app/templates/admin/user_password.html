{% extends "base.html" %}
{% block title %}Change password – {{ user.username }} – Scopewrath{% endblock %}
{% block content %}
<div class="max-w-xl">
  <h1 class="text-2xl font-semibold text-gray-900 dark:text-white mb-4">Change password for {{ user.username }}</h1>
  {% if error %}
  <div class="mb-4 rounded-lg bg-red-50 p-3 text-sm text-red-700 dark:bg-red-900/20 dark:text-red-400">{{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/users/{{ user.id }}/password" class="space-y-4">
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">New password</label>
      <input id="password" name="password" type="password" required minlength="8"
             class="mt-1 block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:border-dae focus:ring-dae dark:bg-gray-700 dark:border-gray-600 dark:text-white"
             placeholder="At least 8 characters">
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit" class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-dae rounded-lg hover:bg-dae/90 focus:ring-4 focus:ring-dae/50">Set password</button>
      <a href="/admin/users" class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
